<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Data - Star Data</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>📶 Buy Data</h2>

<label>Network</label>
<select id="network" class="input">
  <option value="">Select Network</option>
  <option value="MTN">MTN</option>
  <option value="Airtel">Airtel</option>
  <option value="Glo">Glo</option>
  <option value="9mobile">9mobile</option>
</select>

<label>Phone Number</label>
<input type="tel" id="phone" class="input" placeholder="08012345678">

<label>Data Plan</label>
<select id="plan" class="input">
  <option value="">Select Data Plan</option>
  <option value="500MB">500MB</option>
  <option value="1GB">1GB</option>
  <option value="2GB">2GB</option>
  <option value="5GB">5GB</option>
  <option value="10GB">10GB</option>
</select>

<button class="btn" id="buyDataBtn">
Buy Data
</button>

<br>

<a href="dashboard.html" class="btn2">
⬅ Back to Dashboard
</a>

</div>

<script type="module" src="data.js"></script>

</body>
</html>
